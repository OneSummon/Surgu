services:
  database:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d todoapi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./app:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: on-failure

volumes:
  postgres_data: